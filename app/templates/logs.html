<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homie 日志页</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">H</div>
        <div>
          <div class="brand-name">Homie</div>
          <div class="brand-sub">Logs Center</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item" href="/">用户操控页</a>
        <a class="nav-item active" href="/logs/view">日志页</a>
      </nav>
      <div class="side-card">
        <div class="side-title">访问说明</div>
        <div class="side-text">本页默认通过密码校验进入。</div>
      </div>
    </aside>

    <main class="main">
      <section class="hero card">
        <div>
          <h1>Homie 执行日志中心</h1>
          <p>查看设备动作、环境变化、规则触发、聊天控制、硬件上报等所有事件。</p>
        </div>
        <div class="actions">
          <button onclick="refreshLogs()">刷新日志</button>
        </div>
      </section>

      <section class="card">
        <div class="section-title">系统日志流</div>
        <div id="logs" class="stack"></div>
      </section>
    </main>
  </div>
  <script src="/static/logs.js"></script>
</body>
</html>
